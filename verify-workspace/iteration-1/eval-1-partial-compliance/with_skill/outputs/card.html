<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Card Component</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background-color: #f5f5f5;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    .card {
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
      padding: 24px;
      max-width: 400px;
      background-color: #ffffff;
    }

    .card h2 {
      font-size: 1.25rem;
      margin-bottom: 12px;
      color: #1a1a1a;
    }

    .card p {
      font-size: 0.95rem;
      line-height: 1.6;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>Card Title</h2>
    <p>This is a simple card component with rounded corners, a subtle box shadow, and comfortable padding. It demonstrates a clean, minimal design pattern.</p>
  </div>
</body>
</html>
